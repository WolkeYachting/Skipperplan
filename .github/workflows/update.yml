name: Skipperplan täglich aktualisieren

on:
  schedule:
    - cron: '0 5 * * *'   # Jeden Tag um 06:00 Uhr deutscher Zeit (05:00 UTC)
  workflow_dispatch:        # Auch manuell auslösbar über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Backend aufrufen
        run: |
          curl --max-time 120 -f \
            "https://skipperplan-backend.onrender.com/refresh?source=daily&password=${{ secrets.APP_PASSWORD }}"
