name: Skipperplan täglich aktualisieren

on:
  schedule:
    - cron: '0 5 * * *'   # Jeden Tag um 06:00 Uhr deutscher Zeit (05:00 UTC)
  workflow_dispatch:        # Auch manuell auslösbar über GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Server aufwecken
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
              "https://skipperplan-backend.onrender.com/health" || echo "000")
            echo "Versuch $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Server ist wach!"
              break
            fi
            sleep 10
          done

      - name: Skipperplan aktualisieren
        run: |
          curl --max-time 120 -f \
            "https://skipperplan-backend.onrender.com/refresh?source=daily&password=${{ secrets.APP_PASSWORD }}"
